<h2>Products</h2>

<div class="row mb-3">
  <div class="col-md-6">
    <div class="input-group">
      <input type="text" class="form-control" [(ngModel]="searchTerm" (input)="search()" placeholder="Search products...">
      <button class="btn btn-outline-secondary" (click)="search()">Search</button>
    </div>
  </div>
</div>

<div class="row">
  @for (product of products; track product.id) {
    <div class="col-md-4 mb-4">
      <div class="card">
        <div class="card-body">
          <h5 class="card-title">{{ product.name }}</h5>
          <p class="card-text">{{ product.description }}</p>
          <p class="card-text"><strong>Price: ${{ product.price.toFixed(2) }}</strong></p>
          <p>Stock: {{ product.stock }} in stock</p>
        </div>
      </div>
    </div>
  }
  @empty {
    <div class="col">
      <p>No products found.</p>
    </div>
  }
</div>
