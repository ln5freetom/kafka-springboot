version: '3.8'

services:
  rabbitmqServer:
    image: rabbitmq:3-management
    container_name: rabbitmq4Springboot
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - rabbitmq-net

networks:
  rabbitmq-net:
    driver: bridge
